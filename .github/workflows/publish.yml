name: Publish to PyPI

# Triggers when a GitHub Release is published (Releases UI > Publish release).
# Tag-only pushes do NOT publish; you must explicitly publish a release.
on:
  release:
    types: [published]

# Required for OIDC trusted publishing (no API token needed).
permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The "pypi" environment must exist on GitHub
    # (Settings > Environments) AND be registered as a Trusted Publisher
    # on PyPI (https://pypi.org/manage/account/publishing/).
    environment:
      name: pypi
      url: https://pypi.org/p/parallel-orchestra
    permissions:
      id-token: write  # OIDC token for trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
